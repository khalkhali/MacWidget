name: CPUUsageWidget
options:
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 5.0
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  CPUUsage:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: App
      - path: Shared
    resources:
      - path: Resources/AppIcon.icns
    dependencies:
      - target: CPUUsageWidgetExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: local.ariarahimi.cpuusage
        PRODUCT_NAME: CPU Usage
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
  CPUUsageWidgetExtension:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: WidgetExtension
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: local.ariarahimi.cpuusage.widget
        PRODUCT_NAME: CPU Usage Widget Extension
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: WidgetExtension/Info.plist
        APPLICATION_EXTENSION_API_ONLY: YES
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: YES
